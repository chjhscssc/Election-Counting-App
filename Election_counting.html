<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>測試開票系統</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; text-align: center; padding: 50px; }
        .box { border: 2px solid #555; padding: 20px; margin: 20px auto; width: 300px; border-radius: 10px; }
        #debug-info { color: #ff4d4d; border: 1px solid red; padding: 10px; margin: 10px; font-size: 14px; }
        button { padding: 10px; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <h1>靜心學生會開票系統 (測試版)</h1>
    <p>如果你看到這行字，代表 GitHub 已經更新成功了！</p>
    
    <div id="debug-info">正在檢查資料庫連線...</div>

    <div class="box">
        <h2 id="n1">載入中...</h2>
        <div style="font-size: 3em;" id="v1">0</div>
        <button onclick="add('c1')">+1 票</button>
    </div>

    <div class="box">
        <h2 id="n2">載入中...</h2>
        <div style="font-size: 3em;" id="v2">0</div>
        <button onclick="add('c2')">+1 票</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, update, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const config = {
            apiKey: "AIzaSyC_SZW-5X9_4dIqF5-j4iBaJm9Y18gJUv0",
            authDomain: "cssc-voting-election-counting.firebaseapp.com",
            databaseURL: "https://cssc-voting-election-counting-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "cssc-voting-election-counting",
            appId: "1:264807250344:web:ae89ea0a9527263369459d"
        };

        try {
            const app = initializeApp(config);
            const db = getDatabase(app);
            const vRef = ref(db, 'votes');

            onValue(vRef, (s) => {
                const d = s.val();
                if (!d) {
                    document.getElementById('debug-info').innerText = "資料庫是空的，正在嘗試寫入初始數據...";
                    set(vRef, { c1: {name:"候選人 A", count:0}, c2: {name:"候選人 B", count:0}, isFinished: false });
                } else {
                    document.getElementById('debug-info').innerText = "連線成功！數據同步中";
                    document.getElementById('n1').innerText = d.c1.name;
                    document.getElementById('v1').innerText = d.c1.count;
                    document.getElementById('n2').innerText = d.c2.name;
                    document.getElementById('v2').innerText = d.c2.count;
                    window.currentD = d;
                }
            }, (e) => {
                document.getElementById('debug-info').innerText = "連線失敗: " + e.message;
            });

            window.add = (id) => {
                window.currentD[id].count++;
                update(vRef, window.currentD);
            };
        } catch (err) {
            document.getElementById('debug-info').innerText = "啟動錯誤: " + err.message;
        }
    </script>
</body>
</html>
