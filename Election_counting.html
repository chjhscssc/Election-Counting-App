<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>靜心學生會開票系統</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; padding: 20px; }
        .candidate-card { border: 2px solid #333; padding: 20px; margin: 10px; display: inline-block; width: 250px; border-radius: 15px; background: #1e1e1e; }
        .vote-count { font-size: 4em; color: #f1c40f; font-weight: bold; }
        .admin-section { display: none; background: #333; padding: 20px; margin-top: 50px; border-radius: 10px; }
        .btn { padding: 10px 20px; font-size: 16px; cursor: pointer; border: none; border-radius: 5px; margin: 5px; }
        .btn-add { background: #007bff; color: white; }
        .btn-end { background: #e74c3c; color: white; }
        .winner-tag { display: none; color: #e74c3c; font-weight: bold; font-size: 1.5em; border: 2px solid #e74c3c; padding: 5px; transform: rotate(-10deg); }
    </style>
</head>
<body>

    <h1>2026 實時開票實況</h1>
    <div id="loading">正在連線至 Firebase 資料庫...</div>

    <div id="display-area">
        <div class="candidate-card" id="card-c1">
            <h2 id="name-c1">候選人 1</h2>
            <div class="vote-count" id="count-c1">0</div>
            <div id="rate-c1">得票率: 0%</div>
            <div class="winner-tag" id="winner-c1">當選</div>
        </div>
        <div class="candidate-card" id="card-c2">
            <h2 id="name-c2">候選人 2</h2>
            <div class="vote-count" id="count-c2">0</div>
            <div id="rate-c2">得票率: 0%</div>
            <div class="winner-tag" id="winner-c2">當選</div>
        </div>
    </div>

    <div id="admin-area" class="admin-section">
        <h3>管理員後台</h3>
        <button class="btn btn-add" onclick="addVote('c1')">候選人 1 +1</button>
        <button class="btn btn-add" onclick="addVote('c2')">候選人 2 +1</button>
        <br><br>
        <button class="btn btn-end" onclick="endVoting()">結束開票</button>
        <button class="btn" style="background:#666; color:white;" onclick="resetData()">數據歸零</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // 這是你提供的正確 Config
        const firebaseConfig = {
            apiKey: "AIzaSyC_SZW-5X9_4dIqF5-j4iBaJm9Y18gJUv0",
            authDomain: "cssc-voting-election-counting.firebaseapp.com",
            databaseURL: "https://cssc-voting-election-counting-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "cssc-voting-election-counting",
            storageBucket: "cssc-voting-election-counting.firebasestorage.app",
            messagingSenderId: "264807250344",
            appId: "1:264807250344:web:ae89ea0a9527263369459d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const voteRef = ref(db, 'votes');

        // 偵測是否為後台模式
        if (window.location.search.includes('mode=admin')) {
            document.getElementById('admin-area').style.display = 'block';
        }

        // 監聽數據
        onValue(voteRef, (snapshot) => {
            const data = snapshot.val();
            document.getElementById('loading').style.display = 'none';
            
            if (!data) {
                // 如果資料庫是空的，初始化它
                set(voteRef, {
                    c1: { name: "候選人 1", count: 0 },
                    c2: { name: "候選人 2", count: 0 },
                    isFinished: false
                });
                return;
            }

            // 更新畫面
            const total = data.c1.count + data.c2.count;
            ['c1', 'c2'].forEach(id => {
                const count = data[id].count;
                const rate = total === 0 ? 0 : (count / total * 100).toFixed(1);
                document.getElementById(`count-${id}`).innerText = count;
                document.getElementById(`rate-${id}`).innerText = `得票率: ${rate}%`;
                
                // 當選標記邏輯
                document.getElementById(`winner-${id}`).style.display = 'none';
                if (data.isFinished) {
                    const otherId = id === 'c1' ? 'c2' : 'c1';
                    if (data[id].count > data[otherId].count) {
                        document.getElementById(`winner-${id}`).style.display = 'block';
                    }
                }
            });

            // 存為全域變數供按鈕使用
            window.currentVotes = data;
        });

        // 按鈕功能
        window.addVote = (id) => {
            if (window.currentVotes.isFinished) return alert("已結束");
            window.currentVotes[id].count++;
            update(voteRef, window.currentVotes);
        };

        window.endVoting = () => {
            if (confirm("確定結束並顯示當選人？")) {
                window.currentVotes.isFinished = true;
                update(voteRef, window.currentVotes);
            }
        };

        window.resetData = () => {
            if (confirm("確定全部歸零？")) {
                set(voteRef, {
                    c1: { name: "候選人 1", count: 0 },
                    c2: { name: "候選人 2", count: 0 },
                    isFinished: false
                });
            }
        };
    </script>
</body>
</html>
