<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>實時開票系統</title>
    <style>
        :root { --primary-color: #e74c3c; --bg-color: #121212; --card-bg: #1e1e1e; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: var(--bg-color); color: white; text-align: center; margin: 0; padding: 20px; }
        .container { display: flex; justify-content: center; flex-wrap: wrap; gap: 30px; margin-top: 50px; }
        
        /* 顯示端樣式 */
        .card { position: relative; background: var(--card-bg); border: 2px solid #333; border-radius: 20px; width: 300px; padding: 40px 20px; transition: 0.3s; }
        .name { font-size: 2em; font-weight: bold; margin-bottom: 15px; }
        .votes { font-size: 5em; font-weight: 900; color: #f1c40f; margin: 10px 0; }
        .rate { font-size: 1.5em; color: #aaa; }
        .winner-tag { 
            display: none; position: absolute; bottom: -15px; right: -15px; 
            background: var(--primary-color); color: white; padding: 10px 20px; border-radius: 10px; 
            font-weight: bold; font-size: 1.2em; transform: rotate(-10deg); box-shadow: 5px 5px 15px rgba(0,0,0,0.5);
        }
        .is-winner { border-color: var(--primary-color); box-shadow: 0 0 30px rgba(231, 76, 60, 0.4); }
        .is-winner .winner-tag { display: block; animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop { from { transform: scale(0); } to { transform: scale(1) rotate(-10deg); } }

        /* 後台端樣式 */
        .admin-only { display: none; background: #eee; color: #333; padding: 20px; border-radius: 10px; margin-top: 20px; }
        .admin-btn { padding: 15px; font-size: 18px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 8px; width: 100%; margin-top: 10px; }
        .btn-end { background: var(--primary-color); margin-top: 40px; padding: 10px 30px; width: auto; }
        .btn-reset { background: #6c757d; margin-top: 40px; padding: 10px 30px; width: auto; margin-left: 10px; }
    </style>
</head>
<body>

    <div id="display-ui">
        <h1 id="title">2026 實時開票實況</h1>
        <div class="container" id="vote-display">載入中...</div>
    </div>

    <div id="admin-ui" class="admin-only">
        <h2 style="color: #333">管理員控制後台</h2>
        <div class="container" id="admin-controls"></div>
        <div style="margin-top: 20px;">
            <button class="admin-btn btn-end" onclick="endVoting()">結束開票（判定當選）</button>
            <button class="admin-btn btn-reset" onclick="resetData()">一鍵歸零重整</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC_SZW-5X9_4dIqF5-j4iBaJm9Y18gJUv0",
            authDomain: "cssc-voting-election-counting.firebaseapp.com",
            databaseURL: "https://cssc-voting-election-counting-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "cssc-voting-election-counting",
            storageBucket: "cssc-voting-election-counting.firebasestorage.app",
            messagingSenderId: "264807250344",
            appId: "1:264807250344:web:ae89ea0a9527263369459d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const voteRef = ref(db, 'votes');

        const urlParams = new URLSearchParams(window.location.search);
        const isAdmin = urlParams.get('mode') === 'admin';
        if (isAdmin) {
            document.getElementById('admin-ui').style.display = 'block';
            document.body.style.background = '#f0f2f5';
            document.getElementById('title').style.color = '#333';
        }

        let currentData = {
            c1: { name: "候選人 1", count: 0 },
            c2: { name: "候選人 2", count: 0 },
            isFinished: false
        };

        onValue(voteRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                currentData = data;
            } else {
                set(voteRef, currentData);
            }
            render();
        });

        window.addVote = (id) => {
            if (currentData.isFinished) return alert("開票已結束");
            currentData[id].count++;
            update(voteRef, currentData);
        };

        window.endVoting = () => {
            if (confirm("確定結束嗎？將產生當選標記且無法修改。")) {
                currentData.isFinished = true;
                update(voteRef, currentData);
            }
        };

        // 新增：一鍵重整資料功能
        window.resetData = () => {
            if (confirm("🚨 警告：這將會刪除目前所有票數並重設狀態，確定要歸零嗎？")) {
                const newData = {
                    c1: { name: "候選人 1", count: 0 },
                    c2: { name: "候選人 2", count: 0 },
                    isFinished: false
                };
                set(voteRef, newData);
                alert("資料已成功歸零！");
            }
        };

        function render() {
            const total = currentData.c1.count + currentData.c2.count;
            const getRate = (count) => total === 0 ? "0%" : (count / total * 100).toFixed(1) + "%";
            
            let winnerId = null;
            if (currentData.isFinished) {
                if (currentData.c1.count > currentData.c2.count) winnerId = 'c1';
                else if (currentData.c2.count > currentData.c1.count) winnerId = 'c2';
            }

            document.getElementById('vote-display').innerHTML = ['c1', 'c2'].map(id => `
                <div class="card ${winnerId === id ? 'is-winner' : ''}">
                    <div class="name">${currentData[id].name}</div>
                    <div class="votes">${currentData[id].count}</div>
                    <div class="rate">得票率：${getRate(currentData[id].count)}</div>
                    <div class="winner-tag">當選 🗸</div>
                </div>
            `).join('');

            if (isAdmin) {
                document.getElementById('admin-controls').innerHTML = ['c1', 'c2'].map(id => `
                    <div style="background:white; padding:20px; border-radius:10px; width:200px; color:#333">
                        <h3>${currentData[id].name}</h3>
                        <p style="font-size: 20px;">${currentData[id].count} 票</p>
                        <button class="admin-btn" onclick="addVote('${id}')">+1 票</button>
                    </div>
                `).join('');
            }
        }
    </script>
</body>
</html>
