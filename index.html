<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>臺北市私立靜心高級中學 第七屆學生會正副會長選舉開票系統</title>
    <style>
        :root { --bg-color: #121212; --card-bg: #1e1e1e; --primary: #f1c40f; --accent: #e74c3c; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: var(--bg-color); color: white; text-align: center; margin: 0; padding: 20px; transition: background 0.5s; }
        
        h1 { margin-bottom: 40px; color: #fff; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); font-size: 1.8em; line-height: 1.4; }
        .status-container { font-size: 2em; margin-top: 150px; color: #aaa; font-weight: bold; }
        
        .container { display: none; justify-content: center; flex-wrap: wrap; gap: 30px; margin-top: 30px; }
        .card { background: var(--card-bg); border: 2px solid #333; border-radius: 20px; width: 340px; padding: 40px 20px; transition: 0.3s; position: relative; }
        .name { font-size: 1.8em; font-weight: bold; margin-bottom: 15px; }
        .votes { font-size: 5em; font-weight: 900; color: var(--primary); }
        .vote-unit { font-size: 2.2em; color: var(--primary); margin-left: 8px; font-weight: bold; }
        .rate { font-size: 1.5em; color: #888; margin-top: 10px; }
        
        .winner-stamp { display: none; position: absolute; bottom: -12px; right: -28px; width: 75px; height: 75px; transform: rotate(-15deg); }
        .is-winner .winner-stamp { display: block; animation: stampIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        @keyframes stampIn { from { transform: scale(3); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        #congrats-msg {
            display: none; margin: 40px auto; max-width: 800px; font-size: 1.8em; color: #f1c40f; 
            line-height: 1.6; font-weight: bold; background: rgba(0, 0, 0, 0.85);
            padding: 30px; border-radius: 15px; border: 2px dashed #f1c40f; white-space: pre-line;
        }
        #congrats-msg span { color: white; }

        /* 倒數大數字 */
        .countdown-number { font-size: 150px; color: white; font-weight: 900; margin-top: 50px; }

        /* 管理後台 */
        .admin-box { display: none; background: #2c3e50; padding: 30px; margin-top: 50px; border-radius: 15px; border: 1px solid #34495e; position: relative; z-index: 9999; }
        .admin-controls { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; }
        button { padding: 12px 18px; font-size: 15px; cursor: pointer; border: none; border-radius: 8px; font-weight: bold; transition: 0.2s; }
        .btn-start { background: #27ae60; color: white; }
        .btn-pause { background: #f39c12; color: white; }
        .btn-check { background: #d35400; color: white; }
        .btn-add { background: #3498db; color: white; }
        .btn-end { background: #c0392b; color: white; }
        .btn-close { background: #000; color: #f1c40f; border: 1px solid #f1c40f; }
    </style>
</head>
<body>

    <div id="app-content">
        <h1>臺北市私立靜心高級中學<br>第七屆學生會正副會長選舉開票系統</h1>
        <div id="waiting-ui" class="status-container">開票即將開始，敬請稍後</div>

        <div id="counting-ui" class="container">
            <div class="card" id="card-c1">
                <div class="name">1 號 陳瑞婕、郭芸妘</div>
                <div><span class="votes" id="v1">0</span><span class="vote-unit">票</span>
                <img class="winner-stamp" src="https://image2url.com/r2/default/images/1773705761814-1c9e415b-9d2a-47c2-8eee-3cd152ded14e.png"></div>
                <div class="rate" id="r1">得票率: 0.0%</div>
            </div>
            <div class="card" id="card-c2">
                <div class="name">2 號 許維辰、李佳寧</div>
                <div><span class="votes" id="v2">0</span><span class="vote-unit">票</span>
                <img class="winner-stamp" src="https://image2url.com/r2/default/images/1773705761814-1c9e415b-9d2a-47c2-8eee-3cd152ded14e.png"></div>
                <div class="rate" id="r2">得票率: 0.0%</div>
            </div>
        </div>
        <div id="congrats-msg"></div>
    </div>

    <div id="admin-ui" class="admin-box">
        <h3>管理員控制後台</h3>
        <div class="admin-controls">
            <button class="btn-start" onclick="updateStatus('started')">開始/恢復</button>
            <button class="btn-pause" onclick="updateStatus('paused')">暫停整理</button>
            <button class="btn-check" onclick="updateStatus('checking')">票數核對</button>
            <button class="btn-add" onclick="modifyVote('c1', 1)">1 號 +1</button>
            <button class="btn-add" onclick="modifyVote('c2', 1)">2 號 +1</button>
            <button class="btn-end" onclick="updateStatus('finished')">結束開票</button>
            <button class="btn-close" onclick="startShutdown()">關閉網頁(倒數)</button>
        </div>
        <button style="margin-top:20px; background:#7f8c8d; color:white;" onclick="resetData()">重整數據</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC_SZW-5X9_4dIqF5-j4iBaJm9Y18gJUv0",
            authDomain: "cssc-voting-election-counting.firebaseapp.com",
            databaseURL: "https://cssc-voting-election-counting-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "cssc-voting-election-counting",
            appId: "1:264807250344:web:ae89ea0a9527263369459d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const voteRef = ref(db, 'election_2026');
        const isAdmin = window.location.search.includes('mode=admin');

        if (isAdmin) document.getElementById('admin-ui').style.display = 'block';

        let currentData = {};

        onValue(voteRef, (snapshot) => {
            const data = snapshot.val();
            if (!data) return;
            currentData = data;
            
            // 物理級關閉：顯示 404
            if (data.status === "disabled") {
                document.documentElement.innerHTML = `
                    <title>404 Not Found</title>
                    <body style="background:white; color:black; font-family:sans-serif; padding:30px; text-align:left;">
                        <h1>404 Not Found</h1><hr>
                        <address>Apache/2.4.41 (Ubuntu) Server at cssc-voting.chingshin.tp.edu.tw Port 443</address>
                    </body>`;
                return;
            }

            const congratsUI = document.getElementById('congrats-msg');
            const waitUI = document.getElementById('waiting-ui');
            const countUI = document.getElementById('counting-ui');

            // 處理倒數流程視覺
            if (data.status === "closing_pre") {
                congratsUI.innerHTML = "網頁即將於 30 秒後關閉";
                congratsUI.style.display = "block";
            } else if (data.status.startsWith("closing_count_")) {
                const num = data.status.split('_')[2];
                congratsUI.innerHTML = `<div class="countdown-number">${num}</div>`;
                congratsUI.style.display = "block";
            } else if (data.status === "closed_black") {
                document.getElementById('app-content').style.display = "none";
                document.body.style.background = "black";
            } else {
                // 一般顯示邏輯
                waitUI.style.display = data.status === "waiting" ? "block" : "none";
                countUI.style.display = data.status === "waiting" ? "none" : "flex";

                document.getElementById('v1').innerText = data.c1.count;
                document.getElementById('v2').innerText = data.c2.count;
                const total = data.c1.count + data.c2.count;
                const getR = (c) => total === 0 ? "0.0" : (c/total*100).toFixed(1);
                document.getElementById('r1').innerText = `得票率: ${getR(data.c1.count)}%`;
                document.getElementById('r2').innerText = `得票率: ${getR(data.c2.count)}%`;

                document.getElementById('card-c1').classList.toggle('is-winner', data.status === "finished" && data.c1.count/total > 0.5);
                document.getElementById('card-c2').classList.toggle('is-winner', data.status === "finished" && data.c2.count/total > 0.5);

                if (["paused", "checking", "finished"].includes(data.status)) {
                    congratsUI.style.display = "block";
                    if(data.status === "paused") congratsUI.innerHTML = "網頁整理中，即將恢復<br>敬請稍後";
                    if(data.status === "checking") congratsUI.innerHTML = "票數核對中，即將公布當選人<br>敬請稍後";
                    if(data.status === "finished") {
                        const c1W = data.c1.count/total > 0.5;
                        const c2W = data.c2.count/total > 0.5;
                        if(c1W) congratsUI.innerHTML = `恭喜 <span>${data.c1.name}</span> 當選！`;
                        else if(c2W) congratsUI.innerHTML = `恭喜 <span>${data.c2.name}</span> 當選！`;
                        else congratsUI.innerHTML = "雙方得票皆未過半，請待選委會說明";
                    }
                } else { congratsUI.style.display = "none"; }
            }
        });

        window.startShutdown = async () => {
            if(!confirm("啟動毀滅倒數？網頁將永久失效！")) return;
            update(voteRef, { status: "closing_pre" });
            await new Promise(r => setTimeout(r, 5000));
            for (let i = 30; i >= 0; i--) {
                update(voteRef, { status: `closing_count_${i}` });
                await new Promise(r => setTimeout(r, 1000));
            }
            update(voteRef, { status: "closed_black" });
            await new Promise(r => setTimeout(r, 5000));
            update(voteRef, { status: "disabled" });
        };

        window.updateStatus = (s) => update(voteRef, { status: s });
        window.modifyVote = (id, amt) => {
            if(currentData.status !== 'started') return;
            let nc = currentData[id].count + amt;
            update(voteRef, { [id]: { ...currentData[id], count: nc < 0 ? 0 : nc } });
        };
        window.resetData = () => {
            if(confirm("重置數據？")) set(voteRef, { status: "waiting", c1: { name: "1 號 陳瑞婕、郭芸妘", count: 0 }, c2: { name: "2 號 許維辰、李佳寧", count: 0 } });
        };
    </script>
</body>
</html>
