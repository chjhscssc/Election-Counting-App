<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>臺北市私立靜心高級中學 第七屆學生會正副會長選舉開票系統</title>
    <style>
        :root { --bg-color: #121212; --card-bg: #1e1e1e; --primary: #f1c40f; --accent: #e74c3c; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: var(--bg-color); color: white; text-align: center; margin: 0; padding: 20px; transition: background 0.5s; }
        
        /* 觀眾端專用：關閉後的樣式 */
        body.is-closed:not(.admin-mode) { background: black !important; }
        body.is-closed:not(.admin-mode) * { display: none !important; }
        body.is-closed:not(.admin-mode) #not-found-msg { display: block !important; color: #555; font-family: sans-serif; margin-top: 200px; font-size: 2em; }

        h1 { margin-bottom: 40px; color: #fff; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); font-size: 1.8em; line-height: 1.4; }
        .status-container { font-size: 2em; margin-top: 150px; color: #aaa; font-weight: bold; }
        .container { display: none; justify-content: center; flex-wrap: wrap; gap: 30px; margin-top: 30px; }
        .card { background: var(--card-bg); border: 2px solid #333; border-radius: 20px; width: 340px; padding: 40px 20px; transition: 0.3s; position: relative; }
        .name { font-size: 1.8em; font-weight: bold; margin-bottom: 15px; }
        .votes-container { display: inline-block; position: relative; margin: 10px 0; line-height: 1; }
        .votes { font-size: 5em; font-weight: 900; color: var(--primary); }
        .vote-unit { font-size: 2.2em; color: var(--primary); margin-left: 8px; font-weight: bold; vertical-align: baseline; opacity: 0.9; }
        .rate { font-size: 1.5em; color: #888; margin-top: 10px; }
        
        /* 當選圖章 */
        .winner-stamp { display: none; position: absolute; bottom: -12px; right: -28px; width: 75px; height: 75px; z-index: 10; pointer-events: none; transform: rotate(-15deg); }
        .is-winner .winner-stamp { display: block; animation: stampIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes stampIn { from { transform: scale(3) rotate(-45deg); opacity: 0; } to { transform: scale(1) rotate(-15deg); opacity: 1; } }

        /* 公告訊息區 */
        #congrats-msg { display: none; margin: 40px auto; max-width: 800px; font-size: 1.8em; color: #f1c40f; line-height: 1.6; font-weight: bold; background: rgba(0, 0, 0, 0.85); padding: 30px; border-radius: 15px; border: 2px dashed #f1c40f; white-space: pre-line; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        #congrats-msg span { color: white; } 

        /* 倒數層 - 僅觀眾會看到全黑背景，管理員是半透明 */
        #countdown-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98); z-index: 10000;
            justify-content: center; align-items: center; font-size: 4em; color: #f1c40f;
        }
        body.admin-mode #countdown-overlay { background: rgba(0,0,0,0.6); pointer-events: none; }

        /* 管理員後台 */
        .admin-box { display: none; background: #2c3e50; padding: 30px; margin-top: 50px; border-radius: 15px; border: 1px solid #34495e; position: relative; z-index: 999; }
        .admin-controls { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; margin-top: 20px; }
        .btn-close { background: #000; color: #f1c40f; border: 1px solid #f1c40f; }
        button { padding: 12px 20px; font-size: 16px; cursor: pointer; border: none; border-radius: 8px; font-weight: bold; transition: 0.2s; }
        button:hover { opacity: 0.8; transform: scale(1.05); }
    </style>
</head>
<body>

    <div id="not-found-msg" style="display:none;">
        <h2 style="font-size:3em; margin:0;">404</h2>
        <p>Not Found. The requested URL was not found on this server.</p>
    </div>

    <h1>臺北市私立靜心高級中學<br>第七屆學生會正副會長選舉開票系統</h1>

    <div id="countdown-overlay"></div>

    <div id="waiting-ui" class="status-container">開票即將開始，敬請稍後</div>

    <div id="counting-ui" class="container">
        <div class="card" id="card-c1">
            <div class="name">1 號 陳瑞婕、郭芸妘</div>
            <div class="votes-container">
                <span class="votes" id="v1">0</span><span class="vote-unit">票</span>
                <img class="winner-stamp" src="https://image2url.com/r2/default/images/1773705761814-1c9e415b-9d2a-47c2-8eee-3cd152ded14e.png">
            </div>
            <div class="rate" id="r1">得票率: 0.0%</div>
        </div>
        <div class="card" id="card-c2">
            <div class="name">2 號 許維辰、李佳寧</div>
            <div class="votes-container">
                <span class="votes" id="v2">0</span><span class="vote-unit">票</span>
                <img class="winner-stamp" src="https://image2url.com/r2/default/images/1773705761814-1c9e415b-9d2a-47c2-8eee-3cd152ded14e.png">
            </div>
            <div class="rate" id="r2">得票率: 0.0%</div>
        </div>
    </div>

    <div id="congrats-msg"></div>

    <div id="admin-ui" class="admin-box">
        <h3>管理員控制後台</h3>
        <div class="admin-controls">
            <button style="background:#27ae60; color:white;" onclick="updateStatus('started')">恢復開票</button>
            <button style="background:#f39c12; color:white;" onclick="updateStatus('paused')">暫停開票</button>
            <button style="background:#d35400; color:white;" onclick="updateStatus('checking')">票數核對中</button>
            <button style="background:#3498db; color:white;" onclick="modifyVote('c1', 1)">1 號 +1</button>
            <button style="background:#3498db; color:white;" onclick="modifyVote('c2', 1)">2 號 +1</button>
            <button style="background:#c0392b; color:white;" onclick="updateStatus('finished')">結束開票</button>
            <button class="btn-close" onclick="triggerShutdown()">自毀倒數（關閉網頁）</button>
        </div>
        <button style="background:#7f8c8d; color:white; margin-top:20px;" onclick="resetData()">重置數據</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC_SZW-5X9_4dIqF5-j4iBaJm9Y18gJUv0",
            authDomain: "cssc-voting-election-counting.firebaseapp.com",
            databaseURL: "https://cssc-voting-election-counting-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "cssc-voting-election-counting",
            appId: "1:264807250344:web:ae89ea0a9527263369459d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const voteRef = ref(db, 'election_2026');
        const isAdmin = window.location.search.includes('mode=admin');

        if (isAdmin) {
            document.getElementById('admin-ui').style.display = 'block';
            document.body.classList.add('admin-mode');
        }

        let currentData = { status: "waiting", c1: {count:0}, c2: {count:0}, announcement: "", countdown: "" };

        onValue(voteRef, (snapshot) => {
            const data = snapshot.val();
            if (!data) return;
            currentData = data;
            
            // 處理自毀狀態
            const overlay = document.getElementById('countdown-overlay');
            if (data.status === "closing_soon") {
                overlay.style.display = "flex";
                overlay.innerText = data.countdown || "網頁即將於30秒後關閉";
            } else if (data.status === "closed") {
                document.body.classList.add('is-closed');
                overlay.style.display = "none";
                // 5 秒後徹底銷毀 (較建議此版本)
                if(!isAdmin) {
                    setTimeout(() => {
                        document.open();
                        document.write("<body style='background:black; color:#555; text-align:center; padding-top:200px; font-family:sans-serif;'><h1>404 Not Found</h1><p>The server could not find the requested resource.</p></body>");
                        document.close();
                    }, 5000);
                }
            } else {
                document.body.classList.remove('is-closed');
                overlay.style.display = "none";
            }

            // 原始渲染邏輯
            const waitUI = document.getElementById('waiting-ui');
            const countUI = document.getElementById('counting-ui');
            const congratsUI = document.getElementById('congrats-msg');
            
            if (data.status === "waiting") {
                waitUI.style.display = "block"; countUI.style.display = "none"; congratsUI.style.display = "none";
            } else {
                waitUI.style.display = "none"; countUI.style.display = "flex";
                const v1 = data.c1.count, v2 = data.c2.count, total = v1 + v2;
                document.getElementById('v1').innerText = v1;
                document.getElementById('v2').innerText = v2;
                document.getElementById('r1').innerText = `得票率: ${(total===0?0:v1/total*100).toFixed(1)}%`;
                document.getElementById('r2').innerText = `得票率: ${(total===0?0:v2/total*100).toFixed(1)}%`;
                
                document.getElementById('card-c1').classList.remove('is-winner');
                document.getElementById('card-c2').classList.remove('is-winner');

                if (data.status === "finished") {
                    congratsUI.style.display = "block";
                    if (v1 > total/2) { document.getElementById('card-c1').classList.add('is-winner'); congratsUI.innerHTML = `恭喜 <span>${data.c1.name}</span> 當選`; }
                    else if (v2 > total/2) { document.getElementById('card-c2').classList.add('is-winner'); congratsUI.innerHTML = `恭喜 <span>${data.c2.name}</span> 當選`; }
                } else if (data.status === "paused") {
                    congratsUI.style.display = "block"; congratsUI.innerText = "網頁整理中，即將恢復";
                } else if (data.status === "checking") {
                    congratsUI.style.display = "block"; congratsUI.innerText = "票數核對中，即將公布當選人";
                } else {
                    congratsUI.style.display = data.announcement ? "block" : "none";
                    congratsUI.innerText = data.announcement || "";
                }
            }
        });

        // 管理員操作
        window.triggerShutdown = () => {
            if(!confirm("確定啟動 35 秒自毀程序？觀眾端將失效。")) return;
            update(voteRef, { status: "closing_soon", countdown: "網頁即將於30秒後關閉" });
            setTimeout(() => {
                let sec = 30;
                const i = setInterval(() => {
                    if(sec <= 0) { clearInterval(i); update(voteRef, { status: "closed" }); }
                    else { update(voteRef, { countdown: sec.toString() }); sec--; }
                }, 1000);
            }, 5000);
        };

        window.updateStatus = (s) => update(voteRef, { status: s });
        window.modifyVote = (id, amt) => {
            if(currentData.status !== 'started') return;
            let nc = currentData[id].count + amt;
            update(voteRef, { [`${id}/count`]: nc < 0 ? 0 : nc });
        };
        window.resetData = () => {
            if(confirm("確定重置？")) set(voteRef, { status: "waiting", c1: { name: "1 號 陳瑞婕、郭芸妘", count: 0 }, c2: { name: "2 號 許維辰、李佳寧", count: 0 }, announcement: "", countdown: "" });
        };
    </script>
</body>
</html>
