<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>臺北市私立靜心高級中學 第七屆學生會正副會長選舉開票系統</title>
    <style>
        :root { --bg-color: #121212; --card-bg: #1e1e1e; --primary: #f1c40f; --accent: #e74c3c; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: var(--bg-color); color: white; text-align: center; margin: 0; padding: 20px; }
        h1 { margin-bottom: 40px; color: #fff; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); font-size: 1.8em; line-height: 1.4; }
        
        .status-container { font-size: 2em; margin-top: 150px; color: #aaa; font-weight: bold; }
        
        .container { display: none; justify-content: center; flex-wrap: wrap; gap: 30px; margin-top: 30px; }
        .card { position: relative; background: var(--card-bg); border: 2px solid #333; border-radius: 20px; width: 320px; padding: 40px 20px; transition: 0.3s; }
        
        .name { font-size: 1.8em; font-weight: bold; margin-bottom: 15px; }
        .votes { font-size: 5em; font-weight: 900; color: var(--primary); margin: 10px 0; line-height: 1; position: relative; display: inline-block; }
        .rate { font-size: 1.5em; color: #888; margin-top: 10px; }
        
        /* 當選標記尺寸與位置微調（較建議此版本） */
        .winner-stamp { 
            display: none; 
            position: absolute; 
            /* 精確定位於票數右下方 */
            top: 40px; 
            right: -35px; 
            width: 90px;  /* 縮小至數字高度約 65% */
            height: 90px;
            z-index: 10;
            pointer-events: none;
        }
        .is-winner .winner-stamp { display: block; animation: stampIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        @keyframes stampIn {
            from { transform: scale(3) rotate(-45deg); opacity: 0; }
            to { transform: scale(1) rotate(-15deg); opacity: 1; }
        }

        #congrats-msg {
            display: none;
            margin-top: 40px;
            font-size: 1.8em;
            color: #f1c40f;
            line-height: 1.6;
            font-weight: bold;
            background: rgba(241, 196, 15, 0.1);
            padding: 20px;
            border-radius: 15px;
            border: 1px dashed #f1c40f;
        }

        .admin-box { display: none; background: #2c3e50; padding: 30px; margin-top: 50px; border-radius: 15px; border: 1px solid #34495e; }
        .admin-controls { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; margin-top: 20px; }
        button { padding: 12px 20px; font-size: 16px; cursor: pointer; border: none; border-radius: 8px; font-weight: bold; transition: 0.2s; }
        .btn-start { background: #27ae60; color: white; }
        .btn-add { background: #3498db; color: white; }
        .btn-end { background: #e67e22; color: white; }
        .btn-reset { background: #c0392b; color: white; margin-top: 20px; }
        button:hover { opacity: 0.8; transform: scale(1.05); }
    </style>
</head>
<body>

    <h1>臺北市私立靜心高級中學<br>第七屆學生會正副會長選舉開票系統</h1>

    <div id="waiting-ui" class="status-container">開票即將開始，敬請稍後</div>

    <div id="counting-ui" class="container">
        <div class="card" id="card-c1">
            <div class="name">1 號候選人</div>
            <div class="votes">
                <span id="v1">0</span>
                <img class="winner-stamp" src="https://image2url.com/r2/default/images/1773705761814-1c9e415b-9d2a-47c2-8eee-3cd152ded14e.png" alt="當選">
            </div>
            <div class="rate" id="r1">得票率: 0.0%</div>
        </div>
        <div class="card" id="card-c2">
            <div class="name">2 號候選人</div>
            <div class="votes">
                <span id="v2">0</span>
                <img class="winner-stamp" src="https://image2url.com/r2/default/images/1773705761814-1c9e415b-9d2a-47c2-8eee-3cd152ded14e.png" alt="當選">
            </div>
            <div class="rate" id="r2">得票率: 0.0%</div>
        </div>
    </div>

    <div id="congrats-msg"></div>

    <div id="admin-ui" class="admin-box">
        <h3>管理員控制後台</h3>
        <div class="admin-controls">
            <button class="btn-start" onclick="updateStatus('started')">開始開票</button>
            <button class="btn-add" onclick="addVote('c1')">1 號 +1 票</button>
            <button class="btn-add" onclick="addVote('c2')">2 號 +1 票</button>
            <button class="btn-end" onclick="updateStatus('finished')">結束開票</button>
        </div>
        <button class="btn-reset" onclick="resetData()">重整數據（回到準備狀態）</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC_SZW-5X9_4dIqF5-j4iBaJm9Y18gJUv0",
            authDomain: "cssc-voting-election-counting.firebaseapp.com",
            databaseURL: "https://cssc-voting-election-counting-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "cssc-voting-election-counting",
            appId: "1:264807250344:web:ae89ea0a9527263369459d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const voteRef = ref(db, 'election_2026');

        if (window.location.search.includes('mode=admin')) {
            document.getElementById('admin-ui').style.display = 'block';
        }

        let currentData = {
            status: "waiting",
            c1: { name: "1 號候選人", count: 0 },
            c2: { name: "2 號候選人", count: 0 }
        };

        onValue(voteRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                currentData = data;
                render(data);
            } else {
                set(voteRef, currentData);
            }
        });

        function render(data) {
            const waitUI = document.getElementById('waiting-ui');
            const countUI = document.getElementById('counting-ui');
            const congratsUI = document.getElementById('congrats-msg');
            
            if (data.status === "waiting") {
                waitUI.style.display = "block";
                countUI.style.display = "none";
                congratsUI.style.display = "none";
            } else {
                waitUI.style.display = "none";
                countUI.style.display = "flex";
                
                const t = data.c1.count + data.c2.count;
                const getRate = (c) => t === 0 ? "0.0" : (c / t * 100).toFixed(1);
                
                document.getElementById('v1').innerText = data.c1.count;
                document.getElementById('v2').innerText = data.c2.count;
                document.getElementById('r1').innerText = `得票率: ${getRate(data.c1.count)}%`;
                document.getElementById('r2').innerText = `得票率: ${getRate(data.c2.count)}%`;

                document.getElementById('card-c1').classList.remove('is-winner');
                document.getElementById('card-c2').classList.remove('is-winner');
                
                if (data.status === "finished") {
                    let winnerName = "";
                    if (data.c1.count > data.c2.count) {
                        document.getElementById('card-c1').classList.add('is-winner');
                        winnerName = data.c1.name;
                    } else if (data.c2.count > data.c1.count) {
                        document.getElementById('card-c2').classList.add('is-winner');
                        winnerName = data.c2.name;
                    }
                    
                    if (winnerName) {
                        congratsUI.innerHTML = `恭喜 ${winnerName} 當選<br>第七屆臺北市私立靜心高級中學學生會會長、副會長！`;
                        congratsUI.style.display = "block";
                    }
                } else {
                    congratsUI.style.display = "none";
                }
            }
        }

        window.updateStatus = (s) => {
            currentData.status = s;
            update(voteRef, currentData);
        };

        window.addVote = (id) => {
            if (currentData.status !== "started") return alert("請先點擊開始開票");
            currentData[id].count++;
            update(voteRef, currentData);
        };

        window.resetData = () => {
            if (confirm("確定重整數據嗎？這將清空票數並回到等待畫面。")) {
                set(voteRef, {
                    status: "waiting",
                    c1: { name: "1 號候選人", count: 0 },
                    c2: { name: "2 號候選人", count: 0 }
                });
            }
        };
    </script>
</body>
</html>
