<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>臺北市私立靜心高級中學 第七屆學生會正副會長選舉開票系統</title>
    <style>
        :root { --bg-color: #121212; --card-bg: #1e1e1e; --primary: #f1c40f; --accent: #e74c3c; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: var(--bg-color); color: white; text-align: center; margin: 0; padding: 20px; transition: background 0.5s; }
        
        /* 觀眾端關閉樣式 */
        body.is-closed:not(.admin-mode) { background: black !important; }
        body.is-closed:not(.admin-mode) #waiting-ui, 
        body.is-closed:not(.admin-mode) #counting-ui, 
        body.is-closed:not(.admin-mode) #congrats-msg,
        body.is-closed:not(.admin-mode) #countdown-overlay,
        body.is-closed:not(.admin-mode) h1 { display: none !important; }

        h1 { margin-bottom: 40px; color: #fff; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); font-size: 1.8em; line-height: 1.4; }
        .status-container { font-size: 2em; margin-top: 150px; color: #aaa; font-weight: bold; }
        .container { display: none; justify-content: center; flex-wrap: wrap; gap: 30px; margin-top: 30px; }
        .card { background: var(--card-bg); border: 2px solid #333; border-radius: 20px; width: 340px; padding: 40px 20px; transition: 0.3s; position: relative; }
        .name { font-size: 1.8em; font-weight: bold; margin-bottom: 15px; }
        .votes-container { display: inline-block; position: relative; margin: 10px 0; line-height: 1; }
        .votes { font-size: 5em; font-weight: 900; color: var(--primary); }
        .vote-unit { font-size: 2.2em; color: var(--primary); margin-left: 8px; font-weight: bold; vertical-align: baseline; opacity: 0.9; }
        .rate { font-size: 1.5em; color: #888; margin-top: 10px; }
        
        .winner-stamp { display: none; position: absolute; bottom: -12px; right: -28px; width: 75px; height: 75px; z-index: 10; pointer-events: none; transform: rotate(-15deg); }
        .is-winner .winner-stamp { display: block; animation: stampIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        @keyframes stampIn {
            from { transform: scale(3) rotate(-45deg); opacity: 0; }
            to { transform: scale(1) rotate(-15deg); opacity: 1; }
        }

        #congrats-msg { display: none; margin: 40px auto; max-width: 800px; font-size: 1.8em; color: #f1c40f; line-height: 1.6; font-weight: bold; background: rgba(0, 0, 0, 0.85); padding: 30px; border-radius: 15px; border: 2px dashed #f1c40f; white-space: pre-line; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        #congrats-msg span { color: white; } 

        /* 倒數計時專用樣式 - 僅對非管理員顯示 */
        #countdown-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98);
            z-index: 10000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            font-size: 3em;
            color: #f1c40f;
        }
        body.admin-mode #countdown-overlay { background: rgba(0,0,0,0.5); pointer-events: none; }

        .admin-box { display: none; background: #2c3e50; padding: 30px; margin-top: 50px; border-radius: 15px; border: 1px solid #34495e; position: relative; z-index: 999; }
        .admin-controls { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; margin-top: 20px; }
        .announcement-tool { margin-top: 30px; padding-top: 20px; border-top: 1px solid #455a64; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        #announcement-input { width: 80%; max-width: 500px; height: 80px; padding: 10px; border-radius: 8px; border: none; font-size: 16px; background: #ecf0f1; color: #2c3e50; font-family: inherit; }
        .announcement-btns { display: flex; gap: 10px; }
        .hotkey-hint { color: #bdc3c7; font-size: 0.9em; margin-top: 10px; }
        button { padding: 12px 20px; font-size: 16px; cursor: pointer; border: none; border-radius: 8px; font-weight: bold; transition: 0.2s; }
        .btn-start { background: #27ae60; color: white; }
        .btn-pause { background: #f39c12; color: white; }
        .btn-check { background: #d35400; color: white; }
        .btn-add { background: #3498db; color: white; }
        .btn-end { background: #c0392b; color: white; }
        .btn-close { background: #000; color: #f1c40f; border: 1px solid #f1c40f; }
        .btn-send { background: #9b59b6; color: white; }
        .btn-reset { background: #7f8c8d; color: white; margin-top: 20px; }
        button:hover { opacity: 0.8; transform: scale(1.05); }
    </style>
</head>
<body id="main-body">

    <h1>臺北市私立靜心高級中學<br>第七屆學生會正副會長選舉開票系統</h1>

    <div id="countdown-overlay">
        <div id="countdown-text"></div>
    </div>

    <div id="waiting-ui" class="status-container">開票即將開始，敬請稍後</div>

    <div id="counting-ui" class="container">
        <div class="card" id="card-c1">
            <div class="name" id="name-c1">1 號 陳瑞婕、郭芸妘</div>
            <div class="votes-container">
                <span class="votes" id="v1">0</span><span class="vote-unit">票</span>
                <img class="winner-stamp" src="https://image2url.com/r2/default/images/1773705761814-1c9e415b-9d2a-47c2-8eee-3cd152ded14e.png" alt="當選">
            </div>
            <div class="rate" id="r1">得票率: 0.0%</div>
        </div>
        <div class="card" id="card-c2">
            <div class="name" id="name-c2">2 號 許維辰、李佳寧</div>
            <div class="votes-container">
                <span class="votes" id="v2">0</span><span class="vote-unit">票</span>
                <img class="winner-stamp" src="https://image2url.com/r2/default/images/1773705761814-1c9e415b-9d2a-47c2-8eee-3cd152ded14e.png" alt="當選">
            </div>
            <div class="rate" id="r2">得票率: 0.0%</div>
        </div>
    </div>

    <div id="congrats-msg"></div>

    <div id="admin-ui" class="admin-box">
        <h3>管理員控制後台</h3>
        <div class="admin-controls">
            <button class="btn-start" onclick="updateStatus('started')">開始/恢復開票</button>
            <button class="btn-pause" onclick="updateStatus('paused')">暫停開票</button>
            <button class="btn-check" onclick="updateStatus('checking')">票數核對中</button>
            <button class="btn-add" onclick="modifyVote('c1', 1)">1 號 +1</button>
            <button class="btn-add" onclick="modifyVote('c2', 1)">2 號 +1</button>
            <button class="btn-end" onclick="updateStatus('finished')">結束開票</button>
            <button class="btn-close" onclick="startShutdownSequence()">關閉網頁（自毀倒數）</button>
        </div>
        <div class="announcement-tool">
            <textarea id="announcement-input" placeholder="手動發送內容..."></textarea>
            <div class="announcement-btns">
                <button class="btn-send" onclick="sendAnnouncement()">確定發送公告</button>
                <button style="background:#7f8c8d; color:white;" onclick="clearAnnouncement()">清除公告</button>
            </div>
        </div>
        <button class="btn-reset" onclick="resetData()">重整數據</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC_SZW-5X9_4dIqF5-j4iBaJm9Y18gJUv0",
            authDomain: "cssc-voting-election-counting.firebaseapp.com",
            databaseURL: "https://cssc-voting-election-counting-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "cssc-voting-election-counting",
            appId: "1:264807250344:web:ae89ea0a9527263369459d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const voteRef = ref(db, 'election_2026');
        const isAdmin = window.location.search.includes('mode=admin');

        if (isAdmin) {
            document.getElementById('admin-ui').style.display = 'block';
            document.body.classList.add('admin-mode');
        }

        let currentData = {};

        onValue(voteRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                currentData = data;
                render(data);
            }
        });

        function render(data) {
            const overlay = document.getElementById('countdown-overlay');
            const txt = document.getElementById('countdown-text');
            
            // 處理倒數與關閉狀態 (較建議此版本)
            if (data.status === "closing_soon") {
                overlay.style.display = "flex";
                txt.innerText = data.countdown_msg || "";
            } else if (data.status === "closed") {
                document.body.classList.add('is-closed');
                overlay.style.display = "none";
                
                // 非管理員端：5秒後銷毀
                if (!isAdmin) {
                    setTimeout(() => {
                        document.open();
                        document.write("<html><body style='background:black;'></body></html>");
                        document.close();
                    }, 5000);
                }
            } else {
                document.body.classList.remove('is-closed');
                overlay.style.display = "none";
            }

            // 一般 UI 更新
            const waitUI = document.getElementById('waiting-ui');
            const countUI = document.getElementById('counting-ui');
            const congratsUI = document.getElementById('congrats-msg');
            
            if (data.status === "waiting") {
                waitUI.style.display = "block";
                countUI.style.display = "none";
                congratsUI.style.display = "none";
            } else {
                waitUI.style.display = "none";
                countUI.style.display = "flex";
                const total = data.c1.count + data.c2.count;
                document.getElementById('v1').innerText = data.c1.count;
                document.getElementById('v2').innerText = data.c2.count;
                document.getElementById('r1').innerText = `得票率: ${(total===0?0:(data.c1.count/total*100)).toFixed(1)}%`;
                document.getElementById('r2').innerText = `得票率: ${(total===0?0:(data.c2.count/total*100)).toFixed(1)}%`;
                
                // 結束開票邏輯 (略，維持原樣)
                if (data.status === "finished") {
                    congratsUI.style.display = "block";
                    const p1 = (data.c1.count/total) > 0.5;
                    const p2 = (data.c2.count/total) > 0.5;
                    if(p1) { document.getElementById('card-c1').classList.add('is-winner'); congratsUI.innerHTML = `恭喜 <span>${data.c1.name}</span> 當選`; }
                    else if(p2) { document.getElementById('card-c2').classList.add('is-winner'); congratsUI.innerHTML = `恭喜 <span>${data.c2.name}</span> 當選`; }
                } else {
                    congratsUI.style.display = data.announcement ? "block" : "none";
                    congratsUI.innerText = data.announcement || "";
                }
            }
        }

        // 管理員專用：自毀程序
        window.startShutdownSequence = () => {
            if (!confirm("確定要啟動遠端自毀倒數嗎？觀眾端將於 35 秒後失效。")) return;
            
            // 階段一：顯示提示（5秒）
            update(voteRef, { 
                status: "closing_soon", 
                countdown_msg: "網頁即將於30秒後關閉" 
            });

            setTimeout(() => {
                let sec = 30;
                const timer = setInterval(() => {
                    if (sec <= 0) {
                        clearInterval(timer);
                        update(voteRef, { status: "closed" });
                    } else {
                        update(voteRef, { countdown_msg: sec.toString() });
                        sec--;
                    }
                }, 1000);
            }, 5000);
        };

        // 其他視窗函數
        window.updateStatus = (s) => update(voteRef, { status: s });
        window.modifyVote = (id, amt) => {
            if (currentData.status !== 'started') return;
            let val = currentData[id].count + amt;
            update(voteRef, { [`${id}/count`]: val < 0 ? 0 : val });
        };
        window.sendAnnouncement = () => update(voteRef, { announcement: document.getElementById('announcement-input').value });
        window.clearAnnouncement = () => { document.getElementById('announcement-input').value = ""; update(voteRef, { announcement: "" }); };
        window.resetData = () => {
            if(confirm("重置？")) set(voteRef, { status: "waiting", c1: { name: "1 號 陳瑞婕、郭芸妘", count: 0 }, c2: { name: "2 號 許維辰、李佳寧", count: 0 }, announcement: "" });
        };
    </script>
</body>
</html>
